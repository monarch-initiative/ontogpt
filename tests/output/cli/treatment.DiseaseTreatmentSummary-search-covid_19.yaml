input_text: |-
  Title: Neuropsychiatric Sequelae of COVID-19: A Systematic Review of Acute and Prolonged Effects.
  Keywords: COVID-19; SARS-CoV-2 coronavirus; cognitive impairment; memory; neurological manifestations; quality of life.
  PMID: 41941235
  Abstract: Following the global emergence of SARS-CoV-2, it has become evident that COVID-19 can produce persistent, multisystemic symptoms known as "long COVID." Neurocognitive and neuropsychiatric symptoms are reported in approximately 40% of patients, often resulting in significant difficulties with daily functioning, workplace challenges, increased healthcare consumption, and a substantial economic burden. This condition is further linked to serious neurological complications, such as encephalitis, stroke, seizures, and Guillain-Barré syndrome.This study comprised a comprehensive literature review to identify and understand existing research on the long-term neurological impacts of COVID-19. The process involved evaluating investigations into multisystemic symptoms and reviewing documented clinical cases of neurological complications by searching relevant databases for studies published between January 2020 and December 2024.The work identified that while the neurological burden of long COVID-19 is high, there are currently very few treatments described in the literature. Furthermore, the treatments that do exist are often inadequately defined, leaving a gap in standardized clinical protocols for managing neurocognitive decline post-infection.The persistence of these symptoms suggests a need for a deeper understanding of the underlying mechanisms of post-viral neurological damage. The discussion centres on the intersection of cognitive impairment and economic impact, emphasizing that the lack of defined therapeutic pathways hinders recovery and increases the long-term societal burden of the pandemic.This review summarizes current evidence on the neurological and neuropsychiatric sequelae of long COVID-19. It highlights the urgent need for emerging therapeutic approaches and structured management strategies to alleviate cognitive and neuropsychiatric impairments in this patient population effectively.Copyright© Bentham Science Publishers; For any queries, please